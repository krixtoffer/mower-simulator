<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mower Simulator - Mats Diagnostic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: 'Press Start 2P', monospace; }
        canvas { display: block; }
        
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./startbild.png');
            background-size: cover; background-position: center; z-index: 200;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            padding-bottom: 50px; box-sizing: border-box;
        }

        #main-menu-screen, #level-select-screen, #shop-screen, #game-over {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5,0,15,0.95); display: none; flex-direction: column;
            justify-content: center; align-items: center; color: white; z-index: 100;
        }

        .menu-panel {
            background: #1a0033; border: 6px solid #ffff00; box-shadow: 8px 8px 0px #ff00ff;
            padding: 30px; width: 90%; max-width: 550px; text-align: center;
        }

        .level-btn {
            width: 100%; margin: 10px 0; background: #330066; border: 3px solid #00ffff;
            color: white; padding: 15px; font-family: 'Press Start 2P', monospace;
            font-size: 11px; cursor: pointer; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }

        #hud { position: absolute; top: 0; left: 0; width: 100%; pointer-events: none; padding: 20px; box-sizing: border-box; display: none; justify-content: space-between; align-items: flex-start; z-index: 10; }
        .hud-panel {
            background: rgba(0, 0, 0, 0.8); border: 4px solid #ff00ff; box-shadow: 4px 4px 0px #00ffff;
            color: #ffffff; padding: 15px 20px; font-size: 14px;
        }
        
        .arcade-btn { 
            background: #ff00ff; color: white; border: 4px solid #ffffff; padding: 15px 25px; 
            font-family: 'Press Start 2P', monospace; font-size: 11px; cursor: pointer; 
            box-shadow: 4px 4px 0px #00ffff; text-shadow: 2px 2px #000;
        }
        .arcade-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #00ffff; }
    </style>
</head>
<body>

<div id="start-screen">
    <button class="arcade-btn" onclick="openMainMenu()">STARTA SPELET</button>
</div>

<div id="main-menu-screen">
    <div class="menu-panel">
        <h1 style="color: #ffff00; font-size: 18px; margin-top: 0;">MENY</h1>
        <button class="arcade-btn" style="width: 100%; margin: 15px 0; background: #27ae60;" onclick="openLevelSelect()">DIAGNOS: HITTA MATS</button>
    </div>
</div>

<div id="level-select-screen">
    <div class="menu-panel">
        <h1 style="color: #ffff00; font-size: 16px; margin-top: 0;">VÄLJ BANA</h1>
        <div id="level-list"></div>
    </div>
</div>

<div id="hud">
    <div class="hud-panel">KLIPPT: <span id="progress">0</span>%</div>
</div>

<script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const gltfLoader = new GLTFLoader();

    let scene, camera, renderer, lawn, mower;
    let originalMatsModel = null;
    let matsTestArmy = []; // Array för testfigurerna
    
    const COLOR_UNCUT = '#389e38'; 
    const COLOR_CUT = '#7CFC00';
    let lawnCanvas, lawnContext, lawnTexture;
    const lawnTexResolution = 512;
    let lawnWorldSize = 100;

    const mowerStats = { speed: 0, acceleration: 0.03, deceleration: 0.90, maxSpeed: 0.45, turnSpeed: 0.04, rotation: Math.PI, radius: 2.5 };
    const inputs = { up: false, down: false, left: false, right: false };

    let gameStarted = false;
    let currentLevel = 1;

    initThree();
    preloadMats(); // Ladda Mats direkt
    animate();

    function initThree() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); 
        scene.fog = new THREE.Fog(0x87CEEB, 80, 250); 

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
        document.body.appendChild(renderer.domElement);

        window.addEventListener('keydown', e => handleKey(e, true));
        window.addEventListener('keyup', e => handleKey(e, false));
    }

    // --- DIAGNOS: LADDA OCH NOLLSTÄLL MATS ---
    function preloadMats() {
        console.log("Försöker ladda mats.glb...");
        gltfLoader.load('./mats.glb', (gltf) => {
            console.log("mats.glb laddad framgångsrikt!");
            originalMatsModel = gltf.scene;
            
            // Kritisk fix: Nollställ inbyggd position/rotation i filen
            originalMatsModel.position.set(0,0,0);
            originalMatsModel.rotation.set(0,0,0);
            originalMatsModel.scale.set(1,1,1);

            originalMatsModel.traverse(c => { 
                if (c.isMesh) { 
                    // Stäng av castShadow för testet för att se om den mystiska skuggan försvinner
                    c.castShadow = false; 
                    c.receiveShadow = true;
                    if (c.material) c.material.side = THREE.DoubleSide; 
                } 
            });
        }, undefined, (err) => console.error("Kunde inte ladda mats.glb. Kolla att filnamnet är exakt rätt och ligger i samma mapp.", err));
    }

    // --- DIAGNOS: SKAPA ARMÉN AV MATS ---
    function spawnMatsArmy() {
        if (!originalMatsModel) {
            console.warn("Mats modell inte laddad än, kan inte skapa testarmén.");
            return;
        }

        console.log("Skapar Mats-armén för diagnostik...");
        matsTestArmy = [];
        const scales = [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]; // Olika skalor att testa
        const startX = -30;

        scales.forEach((scale, idx) => {
            const matsCopy = originalMatsModel.clone();
            
            // Positionera i en rad på gatan (Z ca 62)
            matsCopy.position.set(startX + (idx * 12), 0, 60);
            matsCopy.scale.setScalar(scale);
            
            scene.add(matsCopy);
            matsTestArmy.push(matsCopy); // Spara för animation
            
            // Lägg till en liten röd sfär vid foten för att markera [0,0,0] punkten
            const marker = new THREE.Mesh(
                new THREE.SphereGeometry(0.2),
                new THREE.MeshBasicMaterial({color: 0xff0000})
            );
            marker.position.copy(matsCopy.position);
            scene.add(marker);
            
            console.log(`Mats testfigur ${idx} skapad. Skala: ${scale}, Position: ${matsCopy.position.x}, ${matsCopy.position.z}`);
        });
    }

    // --- BANBYGGE (ÅTERSTÄLLT OCH STABILT) ---
    function buildHouse(x, z, colorStr) {
        const house = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(60, 25, 40), new THREE.MeshStandardMaterial({ color: colorStr }));
        body.position.y = 12.5; body.castShadow = true; body.receiveShadow = true; house.add(body);
        const roof = new THREE.Mesh(new THREE.ConeGeometry(45, 15, 4), new THREE.MeshStandardMaterial({ color: 0x2a2a2a }));
        roof.position.y = 32.5; roof.rotation.y = Math.PI / 4; roof.castShadow = true; house.add(roof);
        house.position.set(x, 0, z); scene.add(house);
    }

    function buildVillaLevel() {
        lawnWorldSize = 100;
        // Belysning
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6); scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2); dirLight.position.set(50, 100, -150); dirLight.castShadow = true; scene.add(dirLight);
        
        // Mark och väg
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x245419 }));
        ground.rotation.x = -Math.PI / 2; ground.position.y = -0.1; ground.receiveShadow = true; scene.add(ground);
        const street = new THREE.Mesh(new THREE.PlaneGeometry(1000, 24), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        street.rotation.x = -Math.PI / 2; street.position.set(0, 0.05, 62); street.receiveShadow = true; scene.add(street);

        // Hus
        buildHouse(0, -30, '#ffcda8'); buildHouse(-100, -30, '#8fb8cc'); buildHouse(100, -30, '#e6e6a1');

        // Gräsmatta
        lawnCanvas = document.createElement('canvas'); lawnCanvas.width = lawnTexResolution; lawnCanvas.height = lawnTexResolution;
        lawnContext = lawnCanvas.getContext('2d', { willReadFrequently: true });
        lawnContext.fillStyle = COLOR_UNCUT; lawnContext.fillRect(0, 0, lawnTexResolution, lawnTexResolution);
        lawnTexture = new THREE.CanvasTexture(lawnCanvas);
        lawn = new THREE.Mesh(new THREE.PlaneGeometry(lawnWorldSize, lawnWorldSize), new THREE.MeshStandardMaterial({ map: lawnTexture }));
        lawn.rotation.x = -Math.PI / 2; lawn.receiveShadow = true; scene.add(lawn);

        // Diagnos: Starta armén
        spawnMatsArmy();
    }

    function buildMower() {
        mower = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 6), new THREE.MeshStandardMaterial({color: 0xee4444}));
        body.position.y = 1; body.castShadow = true; mower.add(body);
        mower.position.set(0, 0, 20); scene.add(mower);
    }

    // --- MENY OCH LOGIK ---
    window.openMainMenu = () => {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('main-menu-screen').style.display = 'flex';
    }

    window.openLevelSelect = () => {
        document.getElementById('main-menu-screen').style.display = 'none';
        document.getElementById('level-select-screen').style.display = 'flex';
        const list = document.getElementById('level-list'); list.innerHTML = '';
        const btn = document.createElement('button'); btn.className = 'level-btn'; btn.innerHTML = 'Bana 1: Diagnosplan';
        btn.onclick = () => startLevel(1); list.appendChild(btn);
    }

    function startLevel(id) {
        currentLevel = id;
        document.getElementById('level-select-screen').style.display = 'none';
        document.getElementById('hud').style.display = 'flex';
        
        // Rensa scenen
        while(scene.children.length > 0){ scene.remove(scene.children[0]); }
        
        buildVillaLevel();
        buildMower();
        gameStarted = true;
    }

    // --- ANIMATION OCH FYSIK ---
    function animate() {
        requestAnimationFrame(animate);
        
        // Diagnos: Rotera Mats-armén så vi ser dem från alla håll
        matsTestArmy.forEach(mats => {
            mats.rotation.y += 0.01;
        });

        if (gameStarted) {
            // Enkel rotation
            if (inputs.left) mowerStats.rotation += mowerStats.turnSpeed;
            if (inputs.right) mowerStats.rotation -= mowerStats.turnSpeed;
            mower.rotation.y = mowerStats.rotation;

            // Enkel rörelse
            let forwardInput = 0;
            if (inputs.up) forwardInput = 1;
            if (inputs.down) forwardInput = -1;
            
            if (forwardInput !== 0) mowerStats.speed += mowerStats.acceleration * forwardInput;
            else mowerStats.speed *= mowerStats.deceleration;
            
            mowerStats.speed = THREE.MathUtils.clamp(mowerStats.speed, -mowerStats.maxSpeed/2, mowerStats.maxSpeed);
            
            mower.position.x += Math.sin(mowerStats.rotation) * mowerStats.speed;
            mower.position.z += Math.cos(mowerStats.rotation) * mowerStats.speed;

            // Enkel klippning
            if (lawnContext && Math.abs(mowerStats.speed) > 0.01) {
                const uvX = (mower.position.x + lawnWorldSize/2) / lawnWorldSize;
                const uvY = (mower.position.z + lawnWorldSize/2) / lawnWorldSize;
                const texX = uvX * lawnTexResolution; const texY = uvY * lawnTexResolution;
                lawnContext.fillStyle = COLOR_CUT; lawnContext.beginPath();
                lawnContext.arc(texX, texY, (mowerStats.cutWidth/lawnWorldSize)*lawnTexResolution/2 || 10, 0, Math.PI*2);
                lawnContext.fill();
                lawnTexture.needsUpdate = true;
            }

            // Kameraföljning
            const camOffset = new THREE.Vector3(-Math.sin(mowerStats.rotation)*20, 15, -Math.cos(mowerStats.rotation)*20);
            camera.position.lerp(mower.position.clone().add(camOffset), 0.1);
            camera.lookAt(mower.position.x, 2, mower.position.z);
        }
        renderer.render(scene, camera);
    }

    function handleKey(e, isDown) {
        switch(e.key.toLowerCase()) {
            case 'w': case 'arrowup': inputs.up = isDown; break;
            case 's': case 'arrowdown': inputs.down = isDown; break;
            case 'a': case 'arrowleft': inputs.left = isDown; break;
            case 'd': case 'arrowright': inputs.right = isDown; break;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }
</script>
</body>
</html>
