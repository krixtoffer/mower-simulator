<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mower Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
  canvas { display: block; }
  #ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
  #hud { position: fixed; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px black; font-size: 14px; }
  #progress-bar-container { position: fixed; top: 10px; right: 10px; width: 200px; }
  #progress-label { color: white; text-shadow: 1px 1px 2px black; font-size: 12px; margin-bottom: 3px; }
  #progress-bar { width: 100%; height: 16px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 8px; overflow: hidden; }
  #progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); width: 0%; transition: width 0.3s; }
  #menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.85); color: white; pointer-events: all; }
  #menu h1 { font-size: 48px; margin-bottom: 10px; color: #4caf50; text-shadow: 0 0 20px #4caf50; }
  #menu p { margin-bottom: 30px; color: #aaa; }
  .menu-btn { margin: 8px; padding: 12px 30px; font-size: 16px; cursor: pointer; border: 2px solid #4caf50; background: transparent; color: white; border-radius: 6px; transition: all 0.2s; pointer-events: all; min-width: 220px; }
  .menu-btn:hover { background: #4caf50; color: black; }
  #shop-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: all; z-index: 100; }
  #shop-overlay h2 { font-size: 32px; color: #4caf50; margin-bottom: 10px; }
  #shop-preview { width: 300px; height: 220px; margin: 10px auto; }
  #shop-items { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; max-width: 800px; }
  .shop-item { border: 2px solid #555; border-radius: 8px; padding: 14px 18px; cursor: pointer; transition: all 0.2s; min-width: 150px; text-align: center; background: rgba(255,255,255,0.05); }
  .shop-item:hover, .shop-item.selected { border-color: #4caf50; background: rgba(76,175,80,0.15); }
  .shop-item .item-name { font-weight: bold; font-size: 15px; }
  .shop-item .item-price { color: #4caf50; font-size: 13px; margin-top: 4px; }
  .shop-item .item-owned { color: #aaa; font-size: 12px; }
  #level-select-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: all; z-index: 100; }
  #level-select-overlay h2 { font-size: 32px; color: #4caf50; margin-bottom: 20px; }
  .level-btn { margin: 8px; padding: 14px 32px; font-size: 16px; cursor: pointer; border: 2px solid #4caf50; background: transparent; color: white; border-radius: 8px; transition: all 0.2s; min-width: 250px; pointer-events: all; }
  .level-btn:hover { background: #4caf50; color: black; }
  .level-btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }
  #win-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; color: white; pointer-events: all; z-index: 200; }
  #win-overlay h2 { font-size: 48px; color: #4caf50; margin-bottom: 20px; }
  #money-display { position: fixed; bottom: 10px; right: 10px; color: #4caf50; font-size: 18px; font-weight: bold; text-shadow: 1px 1px 2px black; }
  #controls-hint { position: fixed; bottom: 10px; left: 10px; color: rgba(255,255,255,0.6); font-size: 12px; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div id="hud-level">Level: -</div>
  <div id="hud-mower">Mower: -</div>
  <div id="hud-time">Time: 0s</div>
</div>
<div id="progress-bar-container">
  <div id="progress-label">Mowed: 0%</div>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>
<div id="money-display">💰 $0</div>
<div id="controls-hint">WASD / Arrow Keys to drive | ESC = Menu</div>

<!-- MAIN MENU -->
<div id="menu">
  <h1>🌿 Mower Simulator</h1>
  <p>Start your lawn mowing career!</p>
  <button class="menu-btn" onclick="showLevelSelect()">▶ Play</button>
  <button class="menu-btn" onclick="showShop()">🛒 Shop</button>
</div>

<!-- LEVEL SELECT -->
<div id="level-select-overlay">
  <h2>Select Level</h2>
  <button class="level-btn" onclick="startLevel(1)">🏘️ Villakvarter (Neighborhood)</button>
  <button class="level-btn" onclick="startLevel(2)">⚽ Football Stadium</button>
  <button class="level-btn" onclick="startLevel(3)">⛳ Golf Course</button>
  <button class="level-btn" disabled>🌊 Seaside (Coming Soon)</button>
  <br>
  <button class="menu-btn" onclick="showMenu()">← Back</button>
</div>

<!-- SHOP -->
<div id="shop-overlay">
  <h2>🛒 Mower Shop</h2>
  <canvas id="shop-preview" width="300" height="220"></canvas>
  <div id="shop-items"></div>
  <br>
  <button class="menu-btn" onclick="closeShop()">← Back</button>
</div>

<!-- WIN -->
<div id="win-overlay">
  <h2>🎉 Level Complete!</h2>
  <div id="win-details" style="font-size:20px; margin-bottom:20px;"></div>
  <button class="menu-btn" onclick="showLevelSelect()">Play Again</button>
  <button class="menu-btn" onclick="showMenu()">Main Menu</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── GLOBALS ───────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 2000);

let gameActive = false;
let currentLevel = 0;
let money = parseInt(localStorage.getItem('mower_money') || '0');
let ownedMowers = JSON.parse(localStorage.getItem('mower_owned') || '["handjagare"]');
let selectedMower = localStorage.getItem('mower_selected') || 'handjagare';
let mowerObj = null;
let mowerSpeed = 0, mowerRot = 0;
let elapsedTime = 0;
let levelObjects = [];    // objects to dispose on level change
let animatables = [];     // {update(dt)} objects
let mowGrid = null;       // cutting tracking
let mowGridW = 0, mowGridH = 0;
let totalMowable = 0;
let mowedCount = 0;
const keys = {};
let shopRotAngle = 0;
let shopScene, shopCamera, shopRenderer2D;
let shopMowerMesh = null;
let shopAnimId = null;
const gltfLoader = new GLTFLoader();

// GLB paths (from repo)
const GLB = {
  ts112:    'models/ts112.glb',
  klippo:   'models/klippo.glb',
  combine:  'models/combine_harvester.glb',
};

const MOWERS = {
  handjagare: { name: 'Handjagare', price: 0,    speed: 4,  width: 0.6, desc: 'Manual push mower' },
  ts112:      { name: 'Husqvarna TS112', price: 500, speed: 8,  width: 1.2, desc: 'Ride-on mower', glb: GLB.ts112 },
  klippo:     { name: 'Klippo', price: 300, speed: 6,  width: 0.9, desc: 'Walk-behind mower', glb: GLB.klippo },
  combine:    { name: 'Combine Harvester', price: 1200, speed: 12, width: 2.5, desc: 'Massive combine', glb: GLB.combine },
};

// Update money display
function saveMoney() {
  localStorage.setItem('mower_money', money);
  localStorage.setItem('mower_owned', JSON.stringify(ownedMowers));
  localStorage.setItem('mower_selected', selectedMower);
  document.getElementById('money-display').textContent = `💰 $${money}`;
}
saveMoney();

// ─── INPUT ─────────────────────────────────────────────────────────────────
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Escape' && gameActive) pauseToMenu();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── RESIZE ────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
});
renderer.setSize(innerWidth, innerHeight);

// ─── MENU FUNCTIONS ────────────────────────────────────────────────────────
window.showMenu = function() {
  document.getElementById('menu').style.display = 'flex';
  document.getElementById('level-select-overlay').style.display = 'none';
  document.getElementById('shop-overlay').style.display = 'none';
  document.getElementById('win-overlay').style.display = 'none';
  gameActive = false;
};
window.showLevelSelect = function() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('level-select-overlay').style.display = 'flex';
  document.getElementById('win-overlay').style.display = 'none';
};
function pauseToMenu() {
  gameActive = false;
  document.getElementById('menu').style.display = 'flex';
}

// ─── SHOP ──────────────────────────────────────────────────────────────────
window.showShop = function() {
  document.getElementById('menu').style.display = 'none';
  document.getElementById('shop-overlay').style.display = 'flex';
  buildShopUI();
  startShopPreview('handjagare');
};
window.closeShop = function() {
  stopShopPreview();
  document.getElementById('shop-overlay').style.display = 'none';
  document.getElementById('menu').style.display = 'flex';
};

function buildShopUI() {
  const container = document.getElementById('shop-items');
  container.innerHTML = '';
  for (const [id, m] of Object.entries(MOWERS)) {
    const owned = ownedMowers.includes(id);
    const sel = selectedMower === id;
    const div = document.createElement('div');
    div.className = 'shop-item' + (sel ? ' selected' : '');
    div.innerHTML = `<div class="item-name">${m.name}</div>
      <div class="item-price">${owned ? (sel ? '✓ Selected' : 'Owned') : '$' + m.price}</div>
      <div class="item-owned">${m.desc}</div>`;
    div.onclick = () => shopItemClick(id);
    container.appendChild(div);
  }
}

function shopItemClick(id) {
  const m = MOWERS[id];
  const owned = ownedMowers.includes(id);
  if (!owned) {
    if (money >= m.price) {
      money -= m.price;
      ownedMowers.push(id);
      saveMoney();
      alert(`Purchased ${m.name}!`);
    } else {
      alert(`Not enough money! Need $${m.price - money} more.`);
      return;
    }
  }
  selectedMower = id;
  saveMoney();
  buildShopUI();
  startShopPreview(id);
}

// Shop 3D preview using a separate canvas + Three.js scene
function startShopPreview(mowerId) {
  stopShopPreview();
  const previewCanvas = document.getElementById('shop-preview');
  const w = previewCanvas.width, h = previewCanvas.height;

  shopScene = new THREE.Scene();
  shopScene.background = new THREE.Color(0x1a1a2e);
  shopCamera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);
  shopCamera.position.set(2.5, 1.8, 3);
  shopCamera.lookAt(0, 0.5, 0);

  const ambient = new THREE.AmbientLight(0xffffff, 0.6);
  shopScene.add(ambient);
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
  dirLight.position.set(3, 5, 3);
  shopScene.add(dirLight);

  // Ground disc
  const disc = new THREE.Mesh(
    new THREE.CircleGeometry(2, 32),
    new THREE.MeshStandardMaterial({ color: 0x2a4a2a })
  );
  disc.rotation.x = -Math.PI / 2;
  shopScene.add(disc);

  shopMowerMesh = buildMowerMesh(mowerId);
  shopScene.add(shopMowerMesh);

  const shopRenderer = new THREE.WebGLRenderer({ canvas: previewCanvas, antialias: true });
  shopRenderer.setSize(w, h);
  shopRenderer.setPixelRatio(1);
  shopRenderer2D = shopRenderer;

  let angle = 0;
  function shopLoop() {
    shopAnimId = requestAnimationFrame(shopLoop);
    angle += 0.015;
    if (shopMowerMesh) {
      shopMowerMesh.rotation.y = angle;
    }
    shopRenderer.render(shopScene, shopCamera);
  }
  shopLoop();
}

function stopShopPreview() {
  if (shopAnimId) { cancelAnimationFrame(shopAnimId); shopAnimId = null; }
  if (shopRenderer2D) { shopRenderer2D.dispose(); shopRenderer2D = null; }
}

// ─── MOWER MESH BUILDERS ───────────────────────────────────────────────────
function buildMowerMesh(id) {
  const group = new THREE.Group();
  switch (id) {
    case 'handjagare': buildHandjagare(group); break;
    case 'ts112':      buildGLBMower(group, GLB.ts112); break;
    case 'klippo':     buildGLBMower(group, GLB.klippo); break;
    case 'combine':    buildGLBMower(group, GLB.combine); break;
  }
  return group;
}

function buildHandjagare(group) {
  const mat = {
    body:   new THREE.MeshStandardMaterial({ color: 0xcc3300 }),
    wheel:  new THREE.MeshStandardMaterial({ color: 0x222222 }),
    handle: new THREE.MeshStandardMaterial({ color: 0x888888 }),
    blade:  new THREE.MeshStandardMaterial({ color: 0xaaaaaa }),
  };

  // Main body / housing (red dome)
  const bodyGeo = new THREE.CylinderGeometry(0.35, 0.38, 0.15, 16);
  const body = new THREE.Mesh(bodyGeo, mat.body);
  body.position.y = 0.25;
  group.add(body);

  // Top cover
  const topGeo = new THREE.SphereGeometry(0.35, 16, 8, 0, Math.PI * 2, 0, Math.PI / 2);
  const top = new THREE.Mesh(topGeo, mat.body);
  top.position.y = 0.32;
  group.add(top);

  // 4 Wheels
  const wGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.06, 16);
  const wheelPos = [
    [0.3, 0.12, 0.28], [-0.3, 0.12, 0.28],
    [0.3, 0.12, -0.28], [-0.3, 0.12, -0.28],
  ];
  wheelPos.forEach(([x, y, z]) => {
    const w = new THREE.Mesh(wGeo, mat.wheel);
    w.rotation.z = Math.PI / 2;
    w.position.set(x, y, z);
    group.add(w);
    // Tire tread
    const tGeo = new THREE.TorusGeometry(0.12, 0.02, 8, 16);
    const t = new THREE.Mesh(tGeo, mat.wheel);
    t.rotation.z = Math.PI / 2;
    t.position.set(x, y, z);
    group.add(t);
  });

  // Handle bars — two side bars + cross grip
  const hBarGeo = new THREE.CylinderGeometry(0.025, 0.025, 1.1, 8);
  const hMat = mat.handle;
  [-0.18, 0.18].forEach(xOff => {
    const bar = new THREE.Mesh(hBarGeo, hMat);
    bar.position.set(xOff, 0.75, -0.55);
    bar.rotation.x = Math.PI / 5;
    group.add(bar);
  });
  // Cross grip
  const gripGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.45, 8);
  const grip = new THREE.Mesh(gripGeo, mat.handle);
  grip.rotation.z = Math.PI / 2;
  grip.position.set(0, 1.15, -0.88);
  group.add(grip);

  // Blade (visible underneath)
  const bladeGeo = new THREE.BoxGeometry(0.65, 0.03, 0.06);
  const blade = new THREE.Mesh(bladeGeo, mat.blade);
  blade.position.y = 0.18;
  group.add(blade);

  // Roller bar (front)
  const rollerGeo = new THREE.CylinderGeometry(0.06, 0.06, 0.65, 12);
  const roller = new THREE.Mesh(rollerGeo, mat.handle);
  roller.rotation.z = Math.PI / 2;
  roller.position.set(0, 0.1, 0.38);
  group.add(roller);

  group.position.y = 0;
  return group;
}

function buildGLBMower(group, path) {
  gltfLoader.load(
    path,
    (gltf) => {
      const model = gltf.scene;
      // Auto-scale to fit in preview
      const box = new THREE.Box3().setFromObject(model);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z);
      const scale = 1.5 / maxDim;
      model.scale.setScalar(scale);
      // Center
      box.setFromObject(model);
      const center = new THREE.Vector3();
      box.getCenter(center);
      model.position.sub(center);
      model.position.y += size.y * scale / 2;
      group.add(model);
    },
    undefined,
    (err) => {
      console.warn('GLB load error:', path, err);
      // Fallback: colored box
      const mesh = new THREE.Mesh(
        new THREE.BoxGeometry(1, 0.6, 1.5),
        new THREE.MeshStandardMaterial({ color: 0x4caf50 })
      );
      mesh.position.y = 0.3;
      group.add(mesh);
    }
  );
}

// ─── LEVEL BUILDER ─────────────────────────────────────────────────────────
window.startLevel = function(n) {
  document.getElementById('level-select-overlay').style.display = 'none';
  document.getElementById('menu').style.display = 'none';
  document.getElementById('win-overlay').style.display = 'none';
  clearScene();
  currentLevel = n;
  elapsedTime = 0;
  mowedCount = 0;
  totalMowable = 0;
  gameActive = true;

  switch (n) {
    case 1: buildLevel1(); break;
    case 2: buildLevel2(); break;
    case 3: buildLevel3(); break;
  }

  document.getElementById('hud-level').textContent = `Level: ${getLevelName(n)}`;
  document.getElementById('hud-mower').textContent = `Mower: ${MOWERS[selectedMower].name}`;
  updateProgressUI();
};

function getLevelName(n) {
  return ['','Villakvarter','Football Stadium','Golf Course'][n] || '?';
}

function clearScene() {
  animatables = [];
  while (scene.children.length) scene.remove(scene.children[0]);
  if (mowerObj) { mowerObj = null; }
  mowGrid = null;
}

// ─── SHARED SKY + ATMOSPHERE ───────────────────────────────────────────────
function buildSky(skyColor = 0x87ceeb, horizonColor = 0xc8e8ff) {
  scene.background = new THREE.Color(skyColor);
  scene.fog = new THREE.Fog(skyColor, 80, 300);

  // Sun
  const sunGeo = new THREE.SphereGeometry(4, 16, 16);
  const sunMat = new THREE.MeshBasicMaterial({ color: 0xffee88 });
  const sun = new THREE.Mesh(sunGeo, sunMat);
  sun.position.set(60, 80, -80);
  scene.add(sun);
  levelObjects.push(sun);

  // Sun halo
  const haloGeo = new THREE.SphereGeometry(5.5, 16, 16);
  const haloMat = new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.25 });
  const halo = new THREE.Mesh(haloGeo, haloMat);
  halo.position.copy(sun.position);
  scene.add(halo);
  levelObjects.push(halo);

  // Directional light (sun)
  const dirLight = new THREE.DirectionalLight(0xfff5cc, 1.4);
  dirLight.position.set(60, 80, -80);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(2048, 2048);
  dirLight.shadow.camera.near = 0.5;
  dirLight.shadow.camera.far = 500;
  dirLight.shadow.camera.left = dirLight.shadow.camera.bottom = -100;
  dirLight.shadow.camera.right = dirLight.shadow.camera.top = 100;
  scene.add(dirLight);
  levelObjects.push(dirLight);

  const ambient = new THREE.AmbientLight(0xadd8e6, 0.5);
  scene.add(ambient);
  levelObjects.push(ambient);

  // Clouds
  buildClouds();
}

function buildClouds() {
  const cloudMat = new THREE.MeshStandardMaterial({ color: 0xffffff, transparent: true, opacity: 0.88 });
  for (let i = 0; i < 18; i++) {
    const cloud = new THREE.Group();
    const numPuffs = 3 + Math.floor(Math.random() * 4);
    for (let j = 0; j < numPuffs; j++) {
      const r = 3 + Math.random() * 4;
      const puff = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), cloudMat);
      puff.position.set(
        (Math.random() - 0.5) * 12,
        (Math.random() - 0.5) * 3,
        (Math.random() - 0.5) * 6
      );
      cloud.add(puff);
    }
    cloud.position.set(
      (Math.random() - 0.5) * 400,
      40 + Math.random() * 40,
      (Math.random() - 0.5) * 400
    );
    scene.add(cloud);
    levelObjects.push(cloud);
    const speed = 0.5 + Math.random() * 1.5;
    animatables.push({
      update(dt) {
        cloud.position.x += speed * dt;
        if (cloud.position.x > 200) cloud.position.x = -200;
      }
    });
  }
}

// ─── MOW GRID ──────────────────────────────────────────────────────────────
function initMowGrid(worldW, worldH, cellSize = 0.5) {
  mowGridW = Math.ceil(worldW / cellSize);
  mowGridH = Math.ceil(worldH / cellSize);
  mowGrid = new Uint8Array(mowGridW * mowGridH); // 0=unmowed, 1=mowed, 2=no-mow zone
  return { w: mowGridW, h: mowGridH, cellSize, worldW, worldH };
}

function mowGridIdx(gx, gy) { return gy * mowGridW + gx; }

function worldToGrid(wx, wz, gridInfo) {
  const gx = Math.floor((wx + gridInfo.worldW / 2) / gridInfo.cellSize);
  const gy = Math.floor((wz + gridInfo.worldH / 2) / gridInfo.cellSize);
  return { gx, gy };
}

function markMowed(wx, wz, gridInfo, mowerWidth) {
  const mwd = MOWERS[selectedMower].width;
  const halfCells = Math.ceil(mwd / gridInfo.cellSize / 2);
  const center = worldToGrid(wx, wz, gridInfo);
  let newMows = 0;
  for (let dx = -halfCells; dx <= halfCells; dx++) {
    for (let dz = -halfCells; dz <= halfCells; dz++) {
      const gx = center.gx + dx;
      const gy = center.gy + dz;
      if (gx < 0 || gx >= mowGridW || gy < 0 || gy >= mowGridH) continue;
      const idx = mowGridIdx(gx, gy);
      if (mowGrid[idx] === 0) {
        mowGrid[idx] = 1;
        newMows++;
        totalMowable = Math.max(totalMowable, 1); // ensure no div/0
      }
    }
  }
  if (newMows > 0) {
    mowedCount += newMows;
    updateProgressUI();
  }
}

function updateProgressUI() {
  const pct = totalMowable > 0 ? Math.min(100, (mowedCount / totalMowable * 100)).toFixed(1) : 0;
  document.getElementById('progress-label').textContent = `Mowed: ${pct}%`;
  document.getElementById('progress-fill').style.width = pct + '%';
  if (parseFloat(pct) >= 90) {
    levelComplete();
  }
}

function levelComplete() {
  if (!gameActive) return;
  gameActive = false;
  const reward = Math.floor(100 + (300 - elapsedTime) * 0.5);
  money += Math.max(50, reward);
  saveMoney();
  document.getElementById('win-details').textContent =
    `Time: ${elapsedTime.toFixed(1)}s | Reward: $${Math.max(50, reward)}`;

}

  // Dashed center lines
  for (let i = -55; i < 55; i += 6) {

function buildWindow(group, x, y, z, front, side) {
  const winMat = new THREE.MeshStandardMaterial({ color: 0x9ecfff, transparent: true, opacity: 0.7 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
  const curtainColors = [0xff9999, 0xffcc88, 0xaaccff, 0xddaaff, 0xaaffaa];
  const curtainCol = curtainColors[Math.floor(Math.random() * curtainColors.length)];

  const rot = side ? Math.PI / 2 : 0;
  const w = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 0.05), winMat);
  w.position.set(x, y, z);
  w.rotation.y = rot;
  group.add(w);

  // Frame
  [[0, 0.6, 1.3, 0.08], [0, -0.6, 1.3, 0.08], [0.6, 0, 0.08, 1.3], [-0.6, 0, 0.08, 1.3]].forEach(([fx, fy, fw, fh]) => {
    const frame = new THREE.Mesh(new THREE.BoxGeometry(fw, fh, 0.07), frameMat);
    frame.position.set(x + (side ? 0 : fx), y + fy, z + (side ? fx : 0));
    frame.rotation.y = rot;
    group.add(frame);
  });

  // Curtains
  const curtainMat = new THREE.MeshStandardMaterial({ color: curtainCol, side: THREE.DoubleSide });
  [-0.3, 0.3].forEach(cx => {
    const curtain = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 1.0), curtainMat);
    if (side) curtain.position.set(x, y, z + cx);
    else curtain.position.set(x + cx, y, z);
    curtain.rotation.y = rot;
    group.add(curtain);
  });

  // Flower box
  const flowerBox = new THREE.Mesh(new THREE.BoxGeometry(1.2, 0.2, 0.3),
    new THREE.MeshStandardMaterial({ color: 0x8b4513 }));
  if (side) flowerBox.position.set(x, y - 0.72, z);
  else flowerBox.position.set(x, y - 0.72, z + 0.15);
  flowerBox.rotation.y = rot;
  group.add(flowerBox);

  // Flowers
  const flowerColors = [0xff4444, 0xff9900, 0xffff00, 0xff44ff, 0xff6688];
  for (let fi = 0; fi < 4; fi++) {
    const fc = flowerColors[Math.floor(Math.random() * flowerColors.length)];
    const petal = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8),
      new THREE.MeshStandardMaterial({ color: fc }));
    const stemX = -0.4 + fi * 0.25;
    if (side) petal.position.set(x, y - 0.55, z + stemX);
    else petal.position.set(x + stemX, y - 0.55, z + 0.15);
    group.add(petal);
  }
}

function buildFence(group) {
  const postMat = new THREE.MeshStandardMaterial({ color: 0xddd8c4 });
  const railMat = new THREE.MeshStandardMaterial({ color: 0xddd8c4 });
  const fenceW = 10, fenceD = 9;
  const postH = 1.2, postW = 0.12;
  const railH = 0.08;

  // Posts along perimeter
  for (let i = 0; i <= 10; i++) {
    const px = -fenceW / 2 + i;
    [[px, fenceD / 2], [px, -fenceD / 2]].forEach(([x, z]) => {
      const post = new THREE.Mesh(new THREE.BoxGeometry(postW, postH, postW), postMat);
      post.position.set(x, postH / 2, z);
      group.add(post);
    });
  }
  for (let i = 1; i < 9; i++) {
    const pz = -fenceD / 2 + i;
    [[-fenceW / 2, pz], [fenceW / 2, pz]].forEach(([x, z]) => {
      const post = new THREE.Mesh(new THREE.BoxGeometry(postW, postH, postW), postMat);
      post.position.set(x, postH / 2, z);
      group.add(post);
    });
  }

  // Rails
  [[0, 0.9, fenceD / 2], [0, 0.5, fenceD / 2],
   [0, 0.9, -fenceD / 2], [0, 0.5, -fenceD / 2]].forEach(([x, y, z]) => {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(fenceW, railH, railH), railMat);
    rail.position.set(x, y, z);
    group.add(rail);
  });
  [[-fenceW / 2, 0.9, 0], [-fenceW / 2, 0.5, 0],
   [fenceW / 2, 0.9, 0], [fenceW / 2, 0.5, 0]].forEach(([x, y, z]) => {
    const rail = new THREE.Mesh(new THREE.BoxGeometry(railH, railH, fenceD), railMat);
    rail.position.set(x, y, z);
    group.add(rail);
  });
}

function buildBush(x, z) {
  const colors = [0x2d7a2d, 0x3d8a3d, 0x4a9a4a, 0x1d6a1d];

  const g = new THREE.Group();

  for (let i = 0; i < numPuffs; i++) {
    const r = 0.3 + Math.random() * 0.3;
    const puff = new THREE.Mesh(new THREE.SphereGeometry(r, 8, 6), mat);

function buildGardenTable(x, z) {
  const woodMat = new THREE.MeshStandardMaterial({ color: 0xc4963c });
  const metalMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
  const g = new THREE.Group();
  // Table top
  const top = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.08, 12), woodMat);
  top.position.y = 0.75;
  g.add(top);
  // Table leg
  const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.08, 0.7, 8), metalMat);
  leg.position.y = 0.35;
  g.add(leg);
  // Chairs
  const chairAngles = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
  chairAngles.forEach(a => {
    const ch = new THREE.Group();
    const seat = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.05, 0.4), woodMat);
    seat.position.y = 0.45;
    ch.add(seat);
    const back = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.4, 0.05), woodMat);
    back.position.set(0, 0.65, -0.2);
    ch.add(back);
    [[-0.15, 0.22, 0.15], [0.15, 0.22, 0.15], [-0.15, 0.22, -0.15], [0.15, 0.22, -0.15]].forEach(([lx, ly, lz]) => {
      const leg2 = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.45, 6), metalMat);
      leg2.position.set(lx, ly, lz);
      ch.add(leg2);
    });
    ch.position.set(Math.sin(a) * 1.1, 0, Math.cos(a) * 1.1);
    g.add(ch);
  });
  // Umbrella
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 1.8, 8), metalMat);
  pole.position.y = 1.65;
  g.add(pole);
  const umbrella = new THREE.Mesh(new THREE.ConeGeometry(1.1, 0.4, 12),
    new THREE.MeshStandardMaterial({ color: 0xff6644 }));
  umbrella.position.y = 2.55;
  g.add(umbrella);

  g.position.set(x, 0, z);
  scene.add(g);
  levelObjects.push(g);
}

function buildCars() {
  const carColors = [0xcc2222, 0x2244cc, 0x228822, 0xccaa22, 0x222222, 0xcc6622, 0x8822cc];
  const cars = [];

  // Cars moving on horizontal road (z ≈ 0)
  for (let i = 0; i < 4; i++) {
    const car = buildCarMesh(carColors[i % carColors.length]);
    const startX = -60 + i * 30;
    car.position.set(startX, 0.35, i < 2 ? 2.5 : -2.5);
    car.rotation.y = i < 2 ? 0 : Math.PI;
    scene.add(car);
    levelObjects.push(car);
    const dir = i < 2 ? 1 : -1;
    cars.push({ mesh: car, dir, axis: 'x', lane: i < 2 ? 2.5 : -2.5 });
  }

  // Cars moving on vertical road (x ≈ 0)
  for (let i = 0; i < 3; i++) {
    const car = buildCarMesh(carColors[(i + 4) % carColors.length]);
    const startZ = -60 + i * 40;
    car.position.set(i < 2 ? 2.5 : -2.5, 0.35, startZ);
    car.rotation.y = i < 2 ? Math.PI / 2 : -Math.PI / 2;
    scene.add(car);
    levelObjects.push(car);
    const dir = i < 2 ? 1 : -1;
    cars.push({ mesh: car, dir, axis: 'z', lane: i < 2 ? 2.5 : -2.5 });
  }

  animatables.push({
    update(dt) {
      cars.forEach(c => {
        const speed = 8 + Math.random() * 0; // consistent speed
        if (c.axis === 'x') {
          c.mesh.position.x += c.dir * 10 * dt;
          if (c.mesh.position.x > 65) c.mesh.position.x = -65;
          if (c.mesh.position.x < -65) c.mesh.position.x = 65;
          c.mesh.position.z = c.lane;
        } else {
          c.mesh.position.z += c.dir * 10 * dt;
          if (c.mesh.position.z > 65) c.mesh.position.z = -65;
          if (c.mesh.position.z < -65) c.mesh.position.z = 65;
          c.mesh.position.x = c.lane;
        }
      });
    }
  });
}

function buildCarMesh(color) {
  const g = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color });
  const glassMat = new THREE.MeshStandardMaterial({ color: 0x88ccff, transparent: true, opacity: 0.6 });
  const tireMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const rimMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8 });

  // Car body (lower)
  const lower = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.4, 0.9), bodyMat);
  lower.position.y = 0.2;
  lower.castShadow = true;
  g.add(lower);

  // Car body (upper / cabin)
  const upper = new THREE.Mesh(new THREE.BoxGeometry(1.1, 0.38, 0.82), bodyMat);
  upper.position.set(-0.1, 0.59, 0);
  upper.castShadow = true;
  g.add(upper);

  // Windshield
  const windshield = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.35, 0.78), glassMat);
  windshield.position.set(0.44, 0.6, 0);
  g.add(windshield);

  // Rear window
  const rear = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.35, 0.78), glassMat);
  rear.position.set(-0.65, 0.6, 0);
  g.add(rear);

  // Side windows
  [-0.415, 0.415].forEach(z => {
    const sw = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.28, 0.02), glassMat);
    sw.position.set(-0.1, 0.63, z);
    g.add(sw);
  });

  // Wheels
  const wGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.12, 14);
  const rimGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.13, 10);
  [[-0.65, 0, -0.52], [-0.65, 0, 0.52], [0.65, 0, -0.52], [0.65, 0, 0.52]].forEach(([wx, wy, wz]) => {
    const wheel = new THREE.Mesh(wGeo, tireMat);
    wheel.rotation.x = Math.PI / 2;
    wheel.position.set(wx, wy, wz);
    g.add(wheel);
    const rim = new THREE.Mesh(rimGeo, rimMat);
    rim.rotation.x = Math.PI / 2;
    rim.position.set(wx, wy, wz);
    g.add(rim);
  });

  // Headlights
  const lightMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, emissive: 0xffffcc, emissiveIntensity: 0.5 });
  [[-0.2, 0.2], [0.2, 0.2]].forEach(([lz, ly]) => {
    const hl = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.1, 0.15), lightMat);
    hl.position.set(0.9, ly, lz);
    g.add(hl);
  });

function buildAnimals() {
  // Dogs
  const dogData = [
    { x: -20, z: -30, route: [[-20, -30], [-20, -22], [-24, -22], [-24, -30]] },
    { x: 18, z: 22, route: [[18, 22], [24, 22], [24, 28], [18, 28]] },
  ];
  dogData.forEach(d => {
    const dog = buildDogMesh();
    dog.position.set(d.x, 0, d.z);
    scene.add(dog);
    levelObjects.push(dog);
    let routeIdx = 0;
    let t = 0;
    const speed = 3;
    animatables.push({
      update(dt) {
        const from = d.route[routeIdx];
        const to = d.route[(routeIdx + 1) % d.route.length];
        const dx = to[0] - from[0], dz = to[1] - from[1];
        const dist = Math.sqrt(dx * dx + dz * dz);
        t += speed * dt;
        if (t >= dist) {
          t = 0;
          routeIdx = (routeIdx + 1) % d.route.length;
        }
        const progress = dist > 0 ? t / dist : 0;
        dog.position.x = from[0] + dx * progress;
        dog.position.z = from[1] + dz * progress;
        dog.rotation.y = Math.atan2(dx, dz);
        // Leg animation
        dog.children.forEach((c, i) => {
          if (i >= 4 && i <= 7) { // legs
            c.rotation.x = Math.sin(elapsedTime * 8 + i) * 0.4;
          }
        });
        // Tail wag
        if (dog.userData.tail) {
          dog.userData.tail.rotation.z = Math.sin(elapsedTime * 6) * 0.5;
        }
      }
    });
  });

  // Cats
  const catData = [
    { x: -35, z: -10 },
    { x: 25, z: -28 },
  ];
  catData.forEach(d => {
    const cat = buildCatMesh();
    cat.position.set(d.x, 0, d.z);
    scene.add(cat);
    levelObjects.push(cat);
    let pause = Math.random() * 3;
    let moveDir = new THREE.Vector2(Math.random() - 0.5, Math.random() - 0.5).normalize();
    let moveDist = 0;
    animatables.push({
      update(dt) {
        if (pause > 0) { pause -= dt; return; }
        moveDist += 2.5 * dt;
        cat.position.x += moveDir.x * 2.5 * dt;
        cat.position.z += moveDir.y * 2.5 * dt;
        cat.rotation.y = Math.atan2(moveDir.x, moveDir.y);
        if (moveDist > 3 + Math.random() * 3) {
          moveDist = 0;
          pause = 1 + Math.random() * 2;
          moveDir = new THREE.Vector2(Math.random() - 0.5, Math.random() - 0.5).normalize();
        }
        // Keep in bounds
        cat.position.x = Math.max(-55, Math.min(55, cat.position.x));
        cat.position.z = Math.max(-55, Math.min(55, cat.position.z));
      }
    });
  });
}

function buildFootballLines(pw, ph) {
  const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });
  const H = 0.05;

  function addLine(x, y, w, d) {
    const line = new THREE.Mesh(new THREE.BoxGeometry(w, H, d), lineMat);
    line.position.set(x, H / 2 + 0.03, y);
    scene.add(line); levelObjects.push(line);
  }

  // Outer boundary
  addLine(0, 0, pw, 0.3);        // doesn't matter — we draw proper lines
  // Actually draw proper lines:
  const lw = 0.25; // line width
  // Touchlines (sides)
  addLine(-pw / 2 + lw / 2, 0, lw, ph);
  addLine(pw / 2 - lw / 2, 0, lw, ph);
  // Goal lines (ends)
  addLine(0, -ph / 2 + lw / 2, pw, lw);
  addLine(0, ph / 2 - lw / 2, pw, lw);
  // Halfway line
  addLine(0, 0, pw, lw);
  // Center circle
  const circleGeo = new THREE.TorusGeometry(9.15, 0.15, 8, 48);
  const circle = new THREE.Mesh(circleGeo, lineMat);
  circle.rotation.x = -Math.PI / 2;
  circle.position.y = 0.05;
  scene.add(circle); levelObjects.push(circle);
  // Center spot
  const spot = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.06, 12), lineMat);
  spot.position.y = 0.05;
  scene.add(spot); levelObjects.push(spot);

  // Penalty boxes
  [-1, 1].forEach(side => {
    const py = side * (ph / 2 - 16.5 / 2);
    addLine(0, py, 40.32, lw);
    addLine(-40.32 / 2 + lw / 2, side * (ph / 2 - 16.5 / 4), lw, 16.5);
    addLine(40.32 / 2 - lw / 2, side * (ph / 2 - 16.5 / 4), lw, 16.5);
    // Goal boxes
    addLine(0, side * (ph / 2 - 5.5 / 2), 18.32, lw);
    addLine(-18.32 / 2 + lw / 2, side * (ph / 2 - 5.5 / 4), lw, 5.5);
    addLine(18.32 / 2 - lw / 2, side * (ph / 2 - 5.5 / 4), lw, 5.5);
    // Penalty spot
    const pspot = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.06, 12), lineMat);
    pspot.position.set(0, 0.05, side * (ph / 2 - 11));
    scene.add(pspot); levelObjects.push(pspot);
    // Penalty arc
    const arcGeo = new THREE.TorusGeometry(9.15, 0.13, 8, 48, Math.PI * 0.55);
    const arc = new THREE.Mesh(arcGeo, lineMat);
    arc.rotation.x = -Math.PI / 2;
    arc.rotation.z = side > 0 ? Math.PI * 0.725 : Math.PI * 0.725 + Math.PI;
    arc.position.set(0, 0.05, side * (ph / 2 - 11));
    scene.add(arc); levelObjects.push(arc);
    // Goals
    buildGoal(0, side * (ph / 2 + 1.2), side > 0 ? 0 : Math.PI);
  });

  // Corner flags
  [[-pw / 2, -ph / 2], [pw / 2, -ph / 2], [-pw / 2, ph / 2], [pw / 2, ph / 2]].forEach(([cx, cz]) => {
    const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 1.5, 6),
      new THREE.MeshStandardMaterial({ color: 0xeeeeee }));
    flagPole.position.set(cx, 0.75, cz);
    scene.add(flagPole); levelObjects.push(flagPole);
    const flagMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.5, 0.35),
      new THREE.MeshStandardMaterial({ color: 0xff4400, side: THREE.DoubleSide }));
    flagMesh.position.set(cx + 0.25, 1.35, cz);
    scene.add(flagMesh); levelObjects.push(flagMesh);
  });
}

function buildStadiumBleachers(pw, ph) {
  const seatsPerRow = 20;
  const numRows = 8;
  const rowSpacing = 0.8;
  const seatW = 0.55;
  const seatColors = [0xcc2222, 0x2255cc, 0xcc8822, 0x22cc22];

  // Build one stand section
  function buildStand(x, z, width, rotY) {
    const g = new THREE.Group();
    // Concrete structure
    const concreteMat = new THREE.MeshStandardMaterial({ color: 0x888880 });
    for (let row = 0; row < numRows; row++) {
      const raisedH = 0.5 + row * rowSpacing * 0.5;
      const tier = new THREE.Mesh(
        new THREE.BoxGeometry(width, raisedH, 0.7),
        concreteMat
      );
      tier.position.set(0, raisedH / 2, row * 0.7);
      g.add(tier);

      // Seats in this row
      const numSeats = Math.floor(width / seatW);
      for (let s = 0; s < numSeats; s++) {
        const sc = seatColors[Math.floor(Math.random() * seatColors.length)];
        const seatMat = new THREE.MeshStandardMaterial({ color: sc });

        // Seat base
        const seat = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.08, 0.4), seatMat);
        seat.position.set(-width / 2 + s * seatW + seatW / 2, raisedH + 0.04, row * 0.7 + 0.1);
        g.add(seat);

        // Simplified crowd person
        if (Math.random() > 0.15) {
          buildCrowdPerson(g, -width / 2 + s * seatW + seatW / 2, raisedH + 0.22, row * 0.7 + 0.1);
        }
      }
    }
    // Roof over stand
    const roofMat = new THREE.MeshStandardMaterial({ color: 0x555566, transparent: true, opacity: 0.85 });
    const roof = new THREE.Mesh(new THREE.BoxGeometry(width + 2, 0.3, 1), roofMat);
    roof.position.set(0, numRows * rowSpacing * 0.5 + 1.5, numRows * 0.7 / 2 + 2);
    g.add(roof);
    // Roof support columns
    for (let ci = 0; ci < 4; ci++) {
      const col = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, numRows * rowSpacing * 0.5 + 1.5, 6),
        concreteMat);
      col.position.set(-width / 2 + ci * (width / 3), (numRows * rowSpacing * 0.5 + 1.5) / 2, numRows * 0.7 - 1);
      g.add(col);
    }

    g.position.set(x, 0, z);
    g.rotation.y = rotY;
    scene.add(g); levelObjects.push(g);
  }

  // North stand
  buildStand(0, -ph / 2 - 2, pw + 12, 0);
  // South stand (mirrored)
  buildStand(0, ph / 2 + 2, pw + 12, Math.PI);
  // West stand
  buildStand(-pw / 2 - 2, 0, ph + 4, Math.PI / 2);
  // East stand
  buildStand(pw / 2 + 2, 0, ph + 4, -Math.PI / 2);
}

function buildFootballPlayers(pw, ph) {
  const teamColors = [
    { jersey: 0xcc2222, shorts: 0xffffff }, // home
    { jersey: 0x2255cc, shorts: 0x2255cc },  // away
  ];
  const players = [];

  for (let i = 0; i < 14; i++) {
    const team = i < 7 ? teamColors[0] : teamColors[1];
    const player = buildPlayerMesh(team);
    const px = (Math.random() - 0.5) * (pw - 6);
    const pz = (Math.random() - 0.5) * (ph - 6);
    player.position.set(px, 0, pz);
    scene.add(player); levelObjects.push(player);

    // Each player has a ball
    const ball = new THREE.Mesh(
      new THREE.SphereGeometry(0.22, 12, 10),
      new THREE.MeshStandardMaterial({ color: 0xffffff })
    );
    // Pentagon pattern
    const pentagons = new THREE.Mesh(
      new THREE.SphereGeometry(0.225, 12, 10),
      new THREE.MeshStandardMaterial({ color: 0x111111, wireframe: true })
    );
    ball.add(pentagons);
    ball.position.set(px + 0.5, 0.22, pz);
    scene.add(ball); levelObjects.push(ball);

    // Random wandering
    let targetX = (Math.random() - 0.5) * (pw - 4);
    let targetZ = (Math.random() - 0.5) * (ph - 4);
    let waitTime = 0;
    const speed = 4 + Math.random() * 3;

    players.push({
      mesh: player, ball, targetX, targetZ, waitTime, speed,
      update(dt) {
        if (waitTime > 0) { waitTime -= dt; return; }
        const dx = targetX - this.mesh.position.x;
        const dz = targetZ - this.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < 0.5) {
          targetX = (Math.random() - 0.5) * (pw - 4);
          targetZ = (Math.random() - 0.5) * (ph - 4);
          waitTime = Math.random() * 0.5;
          return;
        }
        const nx = dx / dist, nz = dz / dist;
        this.mesh.position.x += nx * this.speed * dt;
        this.mesh.position.z += nz * this.speed * dt;
        this.mesh.rotation.y = Math.atan2(nx, nz);
        // Ball follows slightly behind
        this.ball.position.x = this.mesh.position.x + nx * 0.6;
        this.ball.position.z = this.mesh.position.z + nz * 0.6;
        this.ball.rotation.x += this.speed * dt * 2;

        // Leg animation
        if (this.mesh.userData.leftLeg) {
          this.mesh.userData.leftLeg.rotation.x = Math.sin(elapsedTime * 8) * 0.5;
          this.mesh.userData.rightLeg.rotation.x = -Math.sin(elapsedTime * 8) * 0.5;
        }
      }
    });
  }

  animatables.push({
    update(dt) { players.forEach(p => p.update(dt)); }
  });
}

    const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.065, 0.28, 8), shortsMat);
    thigh.position.set(0, -0.14, 0);
    leg.add(thigh);
    const shin = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.05, 0.26, 8), sockMat);
    shin.position.set(0, -0.42, 0);
    leg.add(shin);
    const boot = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.09, 0.2), bootMat);
    boot.position.set(0, -0.58, 0.04);
    leg.add(boot);
    leg.position.set(lx, 0.7, 0);
    g.add(leg);
  });
  g.userData.leftLeg = leftLeg;
  g.userData.rightLeg = rightLeg;

  return g;
}

// ─── LEVEL 3: GOLF COURSE ──────────────────────────────────────────────────
function buildLevel3() {
  buildSky(0x7ab8e8);

  const GRID_W = 80, GRID_H = 120;

  // Forest border
  buildForestBorder(GRID_W, GRID_H);

  // Outer rough (whole area)
  const roughGeo = new THREE.PlaneGeometry(GRID_W, GRID_H, 80, 120);
  const roughMat = new THREE.MeshStandardMaterial({ color: 0x4a7a2a, roughness: 1 });
  const rough = new THREE.Mesh(roughGeo, roughMat);
  rough.rotation.x = -Math.PI / 2;
  rough.receiveShadow = true;
  scene.add(rough); levelObjects.push(rough);

  // Fairway shape (elongated, curves slightly)
  const fairwayGroup = buildFairway();
  // Pond
  const pondData = buildPond(-12, 20);
  // Bunkers
  const bunkerData = buildBunkers();
  // Green + hole + flag
  buildGreen(0, -42);
  // Tee box
  buildTeeBox(0, 48);

  // Mow grid (only fairway + green are mowable)
  const gridInfo = initMowGrid(GRID_W, GRID_H, 0.5);
  // We'll count mowable area as fairway + green region
  totalMowable = Math.floor(mowGridW * mowGridH * 0.32);

  // Mowing color overlay
  const mowVisGeo = new THREE.PlaneGeometry(GRID_W, GRID_H, 80, 120);
  const mowVisMat = new THREE.MeshStandardMaterial({
    vertexColors: true, roughness: 0.8, transparent: true, opacity: 0.95
  });
  const mowPosAttr = mowVisGeo.attributes.position;
  const mowColors = new Float32Array(mowPosAttr.count * 3);
  for (let i = 0; i < mowPosAttr.count; i++) {
    const vx = mowPosAttr.getX(i);
    const vz = mowPosAttr.getZ(i);
    // Color based on zone
    const col = getGolfColor(vx, vz);
    mowColors[i * 3] = col.r;
    mowColors[i * 3 + 1] = col.g;
    mowColors[i * 3 + 2] = col.b;
  }
  mowVisGeo.setAttribute('color', new THREE.BufferAttribute(mowColors, 3));
  const mowVis = new THREE.Mesh(mowVisGeo, mowVisMat);
  mowVis.rotation.x = -Math.PI / 2;
  mowVis.position.y = 0.03;
  scene.add(mowVis); levelObjects.push(mowVis);
  mowVis.userData.golfMow = true;
  mowVis.userData.pondData = pondData;
  mowVis.userData.bunkerData = bunkerData;
  mowVis.userData.gridInfo = gridInfo;

  // Mower spawns on tee box
  spawnMower(0, 45, gridInfo, mowVis, GRID_W, GRID_H);

  // Pond collision (mark as obstacle)
  mowVis.userData.pondCollider = pondData;

  camera.position.set(0, 50, 80);
  camera.lookAt(0, 0, 0);
}

function getGolfColor(x, z) {
  // Green (putting green area)
  const distGreen = Math.sqrt(x * x + (z + 42) * (z + 42));
  if (distGreen < 10) return { r: 0.15, g: 0.68, b: 0.15 }; // vivid green

  // Fairway (approximate)
  const fairwayBend = Math.sin(z * 0.03) * 8;
  const distFairway = Math.abs(x - fairwayBend);
  if (distFairway < 12 && z > -50 && z < 50) return { r: 0.25, g: 0.58, b: 0.18 }; // medium green

  // Default rough
  return { r: 0.28, g: 0.48, b: 0.18 };
}

function buildFairway() {
  const fairMat = new THREE.MeshStandardMaterial({ color: 0x4a9a2a, roughness: 0.9 });
  // Fairway as slightly elevated, irregular shape using a plane
  const fw = new THREE.Mesh(new THREE.PlaneGeometry(24, 95, 24, 95), fairMat);
  fw.rotation.x = -Math.PI / 2;
  fw.position.y = 0.01;
  scene.add(fw); levelObjects.push(fw);
  return fw;
}

function buildPond(x, z) {
  const pondMat = new THREE.MeshStandardMaterial({
    color: 0x1a6ea8,
    roughness: 0.1,
    metalness: 0.3,
    transparent: true,
    opacity: 0.85
  });
  const pondGeo = new THREE.EllipseCurve(0, 0, 10, 7);
  const points2D = pondGeo.getPoints(32);
  const shape = new THREE.Shape(points2D);
  const pond3D = new THREE.Mesh(
    new THREE.ShapeGeometry(shape),
    pondMat
  );
  pond3D.rotation.x = -Math.PI / 2;
  pond3D.position.set(x, 0.05, z);
  scene.add(pond3D); levelObjects.push(pond3D);

  // Pond edge (darker)
  const edgeMat = new THREE.MeshStandardMaterial({ color: 0x3a5a3a, roughness: 1 });
  const edgeGeo = new THREE.TorusGeometry(9, 0.8, 8, 32);
  const edge = new THREE.Mesh(edgeGeo, edgeMat);
  edge.rotation.x = -Math.PI / 2;
  edge.scale.set(1, 0.7, 1);
  edge.position.set(x, 0.02, z);
  scene.add(edge); levelObjects.push(edge);

  // Ripple animation
  animatables.push({
    update(dt) {
      pond3D.rotation.z += dt * 0.1;
    }
  });

  // Return collider data {x, z, rx, rz}
  return { cx: x, cz: z, rx: 10, rz: 7 };
}

function buildBunkers() {
  const bunkerMat = new THREE.MeshStandardMaterial({ color: 0xe8d8a0, roughness: 1 });
  const bunkerData = [];
  const positions = [
    { x: -14, z: -5, rx: 6, rz: 4 },
    { x: 12, z: 15, rx: 5, rz: 3.5 },
    { x: -8, z: -35, rx: 4, rz: 3 },
    { x: 9, z: -30, rx: 3.5, rz: 3 },
  ];
  positions.forEach(b => {
    const curve = new THREE.EllipseCurve(0, 0, b.rx, b.rz);
    const pts = curve.getPoints(28);
    const shape = new THREE.Shape(pts);
    const bunker = new THREE.Mesh(new THREE.ShapeGeometry(shape), bunkerMat);
    bunker.rotation.x = -Math.PI / 2;
    bunker.position.set(b.x, 0.025, b.z);
    scene.add(bunker); levelObjects.push(bunker);
    bunkerData.push(b);
  });
  return bunkerData;
}

function buildGreen(x, z) {
  const greenMat = new THREE.MeshStandardMaterial({ color: 0x28cc28, roughness: 0.7 });
  const greenGeo = new THREE.CircleGeometry(9, 32);
  const green = new THREE.Mesh(greenGeo, greenMat);
  green.rotation.x = -Math.PI / 2;
  green.position.set(x, 0.04, z);
  scene.add(green); levelObjects.push(green);

  // Fringe
  const fringeMat = new THREE.MeshStandardMaterial({ color: 0x38b838, roughness: 0.8 });
  const fringe = new THREE.Mesh(new THREE.TorusGeometry(9, 0.8, 8, 32), fringeMat);
  fringe.rotation.x = -Math.PI / 2;
  fringe.position.set(x, 0.035, z);
  scene.add(fringe); levelObjects.push(fringe);

  // Hole
  const holeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
  const hole = new THREE.Mesh(new THREE.CircleGeometry(0.54, 16), holeMat);
  hole.rotation.x = -Math.PI / 2;
  hole.position.set(x + 1.5, 0.05, z - 1);
  scene.add(hole); levelObjects.push(hole);

  // Flag pole
  const flagPole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 2.5, 8),
    new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.6 }));
  flagPole.position.set(x + 1.5, 1.25, z - 1);
  scene.add(flagPole); levelObjects.push(flagPole);

  // Flag
  const flagMesh = new THREE.Mesh(new THREE.PlaneGeometry(0.8, 0.5),
    new THREE.MeshStandardMaterial({ color: 0xff2200, side: THREE.DoubleSide }));
  flagMesh.position.set(x + 1.9, 2.3, z - 1);
  scene.add(flagMesh); levelObjects.push(flagMesh);

  // Flag wave
  animatables.push({
    update(dt) {
      flagMesh.rotation.y = Math.sin(elapsedTime * 2) * 0.3;
    }
  });
}

function buildTeeBox(x, z) {
  const teeMat = new THREE.MeshStandardMaterial({ color: 0x3aaa3a, roughness: 0.8 });
  const tee = new THREE.Mesh(new THREE.BoxGeometry(6, 0.05, 5), teeMat);
  tee.position.set(x, 0.025, z);
  scene.add(tee); levelObjects.push(tee);

  // Tee markers
  [[-1.5, 0.15, z - 0.5], [1.5, 0.15, z - 0.5]].forEach(([mx, my, mz]) => {
    const marker = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.3, 0.15),
      new THREE.MeshStandardMaterial({ color: 0xcc2222 }));
    marker.position.set(mx + x, my, mz);
    scene.add(marker); levelObjects.push(marker);
  });
}

function buildForestBorder(gw, gh) {
  const treeCount = 120;
  const innerW = gw / 2 + 5, innerH = gh / 2 + 5;

  for (let i = 0; i < treeCount; i++) {
    let tx, tz;
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { tx = -innerW - Math.random() * 25; tz = (Math.random() - 0.5) * (gh + 50); }
    else if (side === 1) { tx = innerW + Math.random() * 25; tz = (Math.random() - 0.5) * (gh + 50); }
    else if (side === 2) { tx = (Math.random() - 0.5) * (gw + 50); tz = -innerH - Math.random() * 25; }
    else { tx = (Math.random() - 0.5) * (gw + 50); tz = innerH + Math.random() * 25; }

    buildForestTree(tx, tz, 0.7 + Math.random() * 0.8);
  }

  // Also add some trees within the rough area (outside fairway)
  for (let i = 0; i < 30; i++) {
    const tx = (Math.random() - 0.5) * gw * 0.9;
    const tz = (Math.random() - 0.5) * gh * 0.9;
    // Only in rough (not on fairway or green)
    const fairwayDist = Math.abs(tx - Math.sin(tz * 0.03) * 8);
    if (fairwayDist > 15) {
      buildForestTree(tx, tz, 0.5 + Math.random() * 0.5);
    }
  }
}

function buildForestTree(x, z, scale) {
  const g = new THREE.Group();
  const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5a3520 });
  const leafColors = [0x1a6b1a, 0x2d7a2d, 0x1a5a2a, 0x3a8a3a, 0x245a24];
  const leafColor = leafColors[Math.floor(Math.random() * leafColors.length)];
  const leafMat = new THREE.MeshStandardMaterial({ color: leafColor });

  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.15 * scale, 0.22 * scale, 1.8 * scale, 7), trunkMat);
  trunk.position.y = 0.9 * scale;
  g.add(trunk);

  // Layered cone foliage
  [[0, 2.2 * scale, 1.6 * scale], [0, 3.2 * scale, 1.2 * scale], [0, 4.0 * scale, 0.8 * scale]].forEach(([fy, fy2, fr]) => {
    const layer = new THREE.Mesh(new THREE.ConeGeometry(fr, 1.2 * scale, 7), leafMat);
    layer.position.y = fy2;
    layer.castShadow = true;
    g.add(layer);
  });

  g.position.set(x, 0, z);
  scene.add(g); levelObjects.push(g);
}

// ─── SPAWN MOWER ───────────────────────────────────────────────────────────
function spawnMower(x, z, gridInfo, mowPlane, gridW, gridH) {
  mowerObj = new THREE.Group();
  const mowerMesh = buildMowerMesh(selectedMower);
  mowerObj.add(mowerMesh);
  mowerObj.position.set(x, 0, z);
  scene.add(mowerObj);
  levelObjects.push(mowerObj);

  mowerObj.userData.gridInfo = gridInfo;
  mowerObj.userData.mowPlane = mowPlane;
  mowerObj.userData.gridW = gridW || 120;
  mowerObj.userData.gridH = gridH || 120;
  mowerObj.userData.limitW = (gridW || 120) / 2;
  mowerObj.userData.limitH = (gridH || 120) / 2;

  mowerSpeed = 0;
  mowerRot = 0;
}

// ─── GAME LOOP ─────────────────────────────────────────────────────────────
let lastTime = performance.now();

function gameLoop() {
  requestAnimationFrame(gameLoop);
  const now = performance.now();
  const dt = Math.min((now - lastTime) / 1000, 0.1);
  lastTime = now;

  if (gameActive) {
    elapsedTime += dt;
    document.getElementById('hud-time').textContent = `Time: ${elapsedTime.toFixed(1)}s`;

    updateMower(dt);
    animatables.forEach(a => a.update(dt));
    updateCamera();
    checkWin();
  }

  renderer.render(scene, camera);
}

function updateMower(dt) {
  if (!mowerObj) return;
  const mdef = MOWERS[selectedMower];
  const speed = mdef.speed;

  // Rotation
  if (keys['KeyA'] || keys['ArrowLeft']) mowerRot += 1.8 * dt;
  if (keys['KeyD'] || keys['ArrowRight']) mowerRot -= 1.8 * dt;

  // Acceleration
  if (keys['KeyW'] || keys['ArrowUp']) {
    mowerSpeed = Math.min(mowerSpeed + speed * 4 * dt, speed);
  } else if (keys['KeyS'] || keys['ArrowDown']) {
    mowerSpeed = Math.max(mowerSpeed - speed * 4 * dt, -speed * 0.6);
  } else {
    mowerSpeed *= 0.85; // friction
  }

  mowerObj.rotation.y = mowerRot;
  const dx = Math.sin(mowerRot) * mowerSpeed * dt;
  const dz = Math.cos(mowerRot) * mowerSpeed * dt;

  const newX = mowerObj.position.x + dx;
  const newZ = mowerObj.position.z + dz;

  // Boundary check
  const lw = mowerObj.userData.limitW;
  const lh = mowerObj.userData.limitH;
  if (Math.abs(newX) < lw && Math.abs(newZ) < lh) {
    // Level 3: pond collision check
    if (currentLevel === 3 && mowerObj.userData.mowPlane && mowerObj.userData.mowPlane.userData.pondCollider) {
      const pd = mowerObj.userData.mowPlane.userData.pondCollider;
      const ex = (newX - pd.cx) / pd.rx;
      const ez = (newZ - pd.cz) / pd.rz;
      if (ex * ex + ez * ez < 1.0) {
        // In pond — bounce back
        mowerSpeed = 0;
        return;
      }
    }
    mowerObj.position.x = newX;
    mowerObj.position.z = newZ;
  } else {
    mowerSpeed = 0;
  }

  // Mow!
  if (Math.abs(mowerSpeed) > 0.1) {
    const gi = mowerObj.userData.gridInfo;
    if (gi) {
      // Level 3: don't mow bunkers
      if (currentLevel === 3) {
        const mp = mowerObj.userData.mowPlane;
        if (mp && mp.userData.bunkerData) {
          const onBunker = mp.userData.bunkerData.some(b => {
            const ex = (mowerObj.position.x - b.x) / b.rx;
            const ez = (mowerObj.position.z - b.z) / b.rz;
            return ex * ex + ez * ez < 1;
          });
          if (onBunker) return;
        }
      }
      markMowed(mowerObj.position.x, mowerObj.position.z, gi);
      updateMowVisual(mowerObj.position.x, mowerObj.position.z, gi);
    }
  }
}

function updateMowVisual(wx, wz, gridInfo) {
  if (!mowerObj.userData.mowPlane) return;
  const plane = mowerObj.userData.mowPlane;
  const geo = plane.geometry;
  if (!geo.attributes.color) return;

  const colAttr = geo.attributes.color;
  const posAttr = geo.attributes.position;
  const mwd = MOWERS[selectedMower].width;
  const gw = mowerObj.userData.gridW || 120;
  const gh = mowerObj.userData.gridH || 120;

  for (let i = 0; i < posAttr.count; i++) {
    // Plane vertices are in local space (centered at 0), need to offset
    const vx = posAttr.getX(i);
    const vz = posAttr.getZ(i);

    const dx = Math.abs(vx - wx);
    const dz = Math.abs(vz - wz);

    if (dx < mwd && dz < mwd) {
      if (currentLevel === 2) {
        // Football pitch: alternate stripes (lighter/darker green based on Z band)
        const stripe = Math.floor((vz + gh / 2) / 6) % 2;
        if (stripe === 0) { colAttr.setXYZ(i, 0.18, 0.58, 0.12); }
        else { colAttr.setXYZ(i, 0.22, 0.68, 0.16); }
      } else if (currentLevel === 3) {
        // Golf: check zone, but don't change bunkers
        const isBunker = mowerObj.userData.mowPlane.userData.bunkerData &&
          mowerObj.userData.mowPlane.userData.bunkerData.some(b => {
            const ex = (vx - b.x) / b.rx;
            const ez = (vz - b.z) / b.rz;
            return ex * ex + ez * ez < 1;
          });
        if (!isBunker) {
          const distGreen = Math.sqrt(vx * vx + (vz + 42) * (vz + 42));
          if (distGreen < 9) {
            colAttr.setXYZ(i, 0.1, 0.72, 0.1); // vivid cut green
          } else {
            colAttr.setXYZ(i, 0.2, 0.6, 0.15); // cut fairway
          }
        }
      } else {
        // Default: bright green cut
        colAttr.setXYZ(i, 0.3, 0.72, 0.2);
      }
    }
  }
  colAttr.needsUpdate = true;
}

function updateCamera() {
  if (!mowerObj) return;
  const offset = new THREE.Vector3(0, 10, 12);
  const rot = mowerObj.rotation.y;
  const cx = mowerObj.position.x + Math.sin(rot) * -offset.z + Math.sin(rot + Math.PI / 2) * offset.x;
  const cz = mowerObj.position.z + Math.cos(rot) * -offset.z + Math.cos(rot + Math.PI / 2) * offset.x;
  camera.position.lerp(new THREE.Vector3(cx, offset.y, cz), 0.08);
  camera.lookAt(mowerObj.position.x, 0.5, mowerObj.position.z);
}

function checkWin() {
  const pct = totalMowable > 0 ? (mowedCount / totalMowable * 100) : 0;
  if (pct >= 90 && gameActive) levelComplete();
}

// ─── START LOOP ────────────────────────────────────────────────────────────
gameLoop();
</script>
